<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="favicon.ico">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#D4688A">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>ダッシュボード</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
<!-- 画面下部タブバー（スマホ専用） -->
<nav class="mobile-tab-bar">
  <div class="mobile-tab-bar-inner">
    <a href="dashboard.html" class="mobile-tab-item active">
      <span class="mobile-tab-icon">🏠</span>ホーム
    </a>
    <a href="reservations.html" class="mobile-tab-item">
      <span class="mobile-tab-icon">📅</span>予約
    </a>
    <a href="customers.html" class="mobile-tab-item">
      <span class="mobile-tab-icon">👥</span>顧客
    </a>
    <a href="sales.html" class="mobile-tab-item">
      <span class="mobile-tab-icon">📊</span>売上
    </a>
    <a href="settings.html" class="mobile-tab-item">
      <span class="mobile-tab-icon">⚙️</span>設定
    </a>
  </div>
</nav>

<div class="layout">

  <!-- サイドバー -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <span class="logo-en" id="salonNameSidebar">Salon</span>
      <span class="logo-jp">サロン管理システム</span>
      <span class="logo-sub">Admin Panel</span>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-label">Menu</div>
      <a href="dashboard.html" class="nav-item active">
        <span class="nav-icon">◈</span> ダッシュボード
      </a>
      <a href="reservations.html" class="nav-item">
        <span class="nav-icon">◷</span> 予約管理
      </a>
      <a href="customers.html" class="nav-item">
        <span class="nav-icon">◉</span> 顧客管理
      </a>
      <a href="sales.html" class="nav-item">
        <span class="nav-icon">◑</span> 売上レポート
      </a>
      <a href="settings.html" class="nav-item">
        <span class="nav-icon">◎</span> 設定
      </a>
      <a href="exchange-admin.html" class="nav-item" style="display:none" title="β版では無効">
        <span class="nav-icon">◈</span> 交換管理
      </a>
    </nav>
    <div class="sidebar-footer">
      <button class="btn-logout" onclick="logout()">ログアウト</button>
    </div>
  </aside>

  <!-- メインコンテンツ -->
  <div class="main-content">
    <div class="page-header">
      <div>
        <div class="page-title">Dashboard</div>
        <div class="page-subtitle" id="todayDate"></div>
      </div>
      <div class="header-right">
        <span class="badge badge-gold" id="todayBadge">読み込み中...</span>
      </div>
    </div>

    <div class="page-body">

      <!-- バックアップ可視化 -->
      <div id="backupCard" style="display:none;background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:10px 16px;margin-bottom:16px;font-size:0.9rem;display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
        <span style="font-size:1.1rem;">💾</span>
        <span style="color:var(--text-light);">最新バックアップ:</span>
        <span id="backupDate" style="font-weight:600;color:var(--text);">—</span>
        <span id="backupBadge" style="display:none;"></span>
      </div>

      <!-- 統計カード -->
      <div class="stat-grid stat-grid-4">
        <div class="stat-card">
          <div class="stat-icon">📅</div>
          <div>
            <div class="stat-label">本日の予約</div>
            <div class="stat-value"><span id="statToday">—</span><span class="stat-unit">件</span></div>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon">📊</div>
          <div>
            <div class="stat-label">今月の予約</div>
            <div class="stat-value"><span id="statMonth">—</span><span class="stat-unit">件</span></div>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon">💴</div>
          <div>
            <div class="stat-label">今月の売上</div>
            <div class="stat-value" style="font-size:1.5rem;"><span id="statMonthSales">—</span></div>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon">👤</div>
          <div>
            <div class="stat-label">総顧客数</div>
            <div class="stat-value"><span id="statCustomer">—</span><span class="stat-unit">名</span></div>
          </div>
        </div>
      </div>

      <!-- コース残回数アラート -->
      <div class="card" id="courseAlertCard" style="display:none;">
        <div class="card-title" style="color:#B71C1C;">⚠️ コース残回数アラート</div>
        <div id="courseAlertContent"></div>
      </div>

      <!-- 本日の予約 -->
      <div class="card">
        <div class="card-title">📋 本日の予約</div>
        <div id="todayContent">
          <div class="loading"><div class="spinner"></div> 読み込み中...</div>
        </div>
      </div>

      <!-- 売上レポート -->
      <div class="card">
        <div class="card-title" style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;">
          <span>📊 売上レポート</span>
          <div style="display:flex;align-items:center;gap:8px;">
            <select id="dashMonthSelect" onchange="loadSalesReport()" style="padding:5px 10px;border:1px solid var(--border);border-radius:var(--radius);font-size:0.85rem;background:#fff;cursor:pointer;">
              <option value="3">直近3ヶ月</option>
              <option value="6" selected>直近6ヶ月</option>
              <option value="12">直近12ヶ月</option>
            </select>
            <a href="sales.html" style="font-size:0.8rem;color:var(--gold-dark);text-decoration:underline;">詳細ページへ</a>
          </div>
        </div>

        <!-- サマリーカード -->
        <div class="stat-grid" style="margin-bottom:16px;" id="dashSummaryCards">
          <div class="stat-card">
            <div class="stat-icon">💴</div>
            <div>
              <div class="stat-label">期間合計売上</div>
              <div class="stat-value"><span id="dashTotalSales">—</span><span class="stat-unit">円</span></div>
            </div>
          </div>
          <div class="stat-card">
            <div class="stat-icon">✂️</div>
            <div>
              <div class="stat-label">期間合計来店</div>
              <div class="stat-value"><span id="dashTotalVisits">—</span><span class="stat-unit">件</span></div>
            </div>
          </div>
          <div class="stat-card">
            <div class="stat-icon">📈</div>
            <div>
              <div class="stat-label">平均客単価</div>
              <div class="stat-value"><span id="dashAvgSales">—</span><span class="stat-unit">円</span></div>
            </div>
          </div>
        </div>

        <!-- グラフ -->
        <div id="dashChartArea" style="position:relative;height:240px;">
          <div class="loading"><div class="spinner"></div> 読み込み中...</div>
        </div>
      </div>

    </div>
  </div>
</div>

<script>
  checkAuth();

  // サロン名を反映
  document.getElementById('salonNameSidebar').textContent = SALON_NAME;
  document.title = 'ダッシュボード - ' + SALON_NAME;

  // 今日の日付
  const today = new Date();
  const dateStr = today.toLocaleDateString('ja-JP', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'short' });
  document.getElementById('todayDate').textContent = dateStr;

  function statusBadge(status) {
    const map = {
      '送信済':    'badge-green',
      'リマインド済': 'badge-blue',
      'キャンセル': 'badge-red',
      '未送信':    'badge-gray',
    };
    const cls = map[status] || 'badge-gray';
    return `<span class="badge ${cls}">${status || '未送信'}</span>`;
  }

  function planBadge(r) {
    if (r.plan === '回数コース') {
      const color = r.courseRemaining <= 2 ? '#B71C1C' : r.courseRemaining <= 4 ? '#E65100' : '#2E7D4F';
      return `<span style="display:inline-flex;align-items:center;gap:4px;background:#f0f8ff;border:1px solid #b3d9f7;color:#1565C0;border-radius:20px;padding:2px 10px;font-size:0.8rem;font-weight:600;">🎟 <span style="background:${color};color:#fff;border-radius:10px;padding:1px 7px;font-size:0.78rem;">残${r.courseRemaining}回</span></span>`;
    }
    return `<span style="background:#f5f5f5;border:1px solid #ddd;color:#999;border-radius:20px;padding:2px 10px;font-size:0.8rem;">都度払い</span>`;
  }

  async function loadDashboard() {
    const data = await getDashboard();
    if (!data) return;

    document.getElementById('statToday').textContent    = data.todayCount    ?? 0;
    document.getElementById('statMonth').textContent    = data.monthCount    ?? 0;
    document.getElementById('statCustomer').textContent = data.customerCount ?? 0;
    document.getElementById('statMonthSales').textContent = `¥${(data.monthSales || 0).toLocaleString('ja-JP')}`;
    document.getElementById('todayBadge').textContent   = `本日 ${data.todayCount ?? 0} 件`;

    // バックアップ情報
    const bk = data.lastBackup;
    const bkCard = document.getElementById('backupCard');
    if (bk && bk.date) {
      bkCard.style.display = 'flex';
      document.getElementById('backupDate').textContent = bk.date;
      const badge = document.getElementById('backupBadge');
      if (bk.stale) {
        bkCard.style.borderColor = '#E89B3C';
        bkCard.style.background  = '#FFF7E8';
        badge.style.display = 'inline-block';
        badge.style.cssText = 'display:inline-block;background:#E89B3C;color:#fff;border-radius:10px;padding:2px 10px;font-size:0.78rem;font-weight:600;';
        badge.textContent = `⚠ ${bk.daysAgo}日前`;
      } else {
        bkCard.style.borderColor = '';
        bkCard.style.background  = '#fff';
        badge.style.display = 'none';
      }
    } else {
      bkCard.style.display = 'none';
    }

    // コース残回数アラート描画
    const alerts = data.courseAlerts || [];
    const alertCard = document.getElementById('courseAlertCard');
    const alertEl   = document.getElementById('courseAlertContent');
    if (alerts.length > 0) {
      alertCard.style.display = '';
      alertEl.innerHTML = `
        <div style="display:flex;flex-direction:column;gap:8px;">
          ${alerts.map(a => {
            const badgeColor = a.courseRemaining <= 2 ? '#B71C1C' : '#E65100';
            const bgColor    = a.courseRemaining <= 2 ? '#FDEAEA' : '#FFF3E0';
            return `
            <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:${bgColor};border-radius:8px;border:1px solid ${badgeColor}33;">
              <a href="customer-detail.html?id=${encodeURIComponent(a.customerId)}" style="font-weight:600;color:var(--text);text-decoration:underline;">${a.name}</a>
              <span style="display:inline-flex;align-items:center;gap:6px;">
                <span style="background:${badgeColor};color:#fff;border-radius:10px;padding:2px 10px;font-size:0.8rem;font-weight:700;">残${a.courseRemaining}回</span>
                <span style="font-size:0.78rem;color:var(--text-light);">/ ${a.courseTotal}回</span>
              </span>
            </div>`;
          }).join('')}
        </div>`;
    } else {
      alertCard.style.display = 'none';
    }

    const list = data.todayReservations || [];
    const el   = document.getElementById('todayContent');

    if (list.length === 0) {
      el.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">🌿</div>
          <p>本日の予約はありません</p>
        </div>`;
      return;
    }

    if (window.innerWidth <= 768) {
      // スマホ：カード形式
      el.innerHTML = list.map(r => `
        <div id="row-${r.row}" style="background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:12px;">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">
            <span style="font-size:1.2rem;font-weight:700;color:var(--text);">${r.time}</span>
            ${statusBadge(r.status)}
          </div>
          <div style="font-size:1rem;font-weight:600;color:var(--text);margin-bottom:4px;">
            ${r.customerId ? `<a href="customer-detail.html?id=${encodeURIComponent(r.customerId)}" style="color:var(--gold-dark);text-decoration:underline;">${r.name}</a>` : r.name} 様
          </div>
          <div style="font-size:0.85rem;color:var(--text-light);margin-bottom:8px;">${r.menu || '—'}</div>
          <div style="margin-bottom:8px;">${planBadge(r)}</div>
          <div style="display:flex;gap:8px;align-items:center;">
            ${r.status === '完了' || r.status === 'キャンセル'
              ? '—'
              : `<button class="btn btn-complete" style="flex:1;" onclick="doComplete(${r.row}, this)">✓ 完了</button>
                 <button class="btn btn-danger btn-sm" onclick="doCancel(${r.row}, this)">キャンセル</button>`}
          </div>
        </div>`).join('');
    } else {
      // PC：テーブル形式
      el.innerHTML = `
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>時間</th>
                <th>お客様名</th>
                <th>メニュー</th>
                <th>残回数</th>
                <th>電話番号</th>
                <th>ステータス</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody>
              ${list.map(r => `
                <tr id="row-${r.row}">
                  <td><strong>${r.time}</strong></td>
                  <td>${r.customerId ? `<a href="customer-detail.html?id=${encodeURIComponent(r.customerId)}" style="color:var(--gold-dark);text-decoration:underline;font-weight:600;">${r.name}</a>` : r.name} 様</td>
                  <td>${r.menu}</td>
                  <td>${planBadge(r)}</td>
                  <td>${r.phone || '—'}</td>
                  <td>${statusBadge(r.status)}</td>
                  <td>
                    ${r.status === '完了' || r.status === 'キャンセル'
                      ? (r.status === '完了' ? '<span style="color:#2E7D4F;font-size:0.82rem;">✓ 完了</span>' : '—')
                      : `<button class="btn btn-complete" onclick="doComplete(${r.row}, this)">✓ 完了</button>
                         <button class="btn btn-danger btn-sm" onclick="doCancel(${r.row}, this)">キャンセル</button>`}
                  </td>
                </tr>`).join('')}
            </tbody>
          </table>
        </div>`;
    }
  }

  async function doComplete(row, btn) {
    if (!confirm('来店完了にしますか？\nメニューに応じたポイントが自動で付与されます。')) return;
    btn.disabled    = true;
    btn.textContent = '処理中...';
    const res = await completeReservation(row);
    if (res && res.success) {
      loadDashboard();
    } else {
      alert('処理に失敗しました: ' + (res && res.message ? res.message : ''));
      btn.disabled    = false;
      btn.textContent = '✓ 完了';
    }
  }

  async function doCancel(row, btn) {
    if (!confirm('この予約をキャンセルしますか？')) return;
    btn.disabled    = true;
    btn.textContent = '処理中...';
    const res = await cancelReservation(row);
    if (res && res.success) {
      loadDashboard();
    } else {
      alert('キャンセルに失敗しました。');
      btn.disabled    = false;
      btn.textContent = 'キャンセル';
    }
  }

  // ── 売上レポート ──────────────────────────────
  let dashBarChart = null;

  function fmtNum(n) {
    return Number(n).toLocaleString('ja-JP');
  }

  async function loadSalesReport() {
    const months = document.getElementById('dashMonthSelect').value;

    document.getElementById('dashChartArea').innerHTML =
      '<div class="loading"><div class="spinner"></div> 読み込み中...</div>';
    document.getElementById('dashTotalSales').textContent  = '—';
    document.getElementById('dashTotalVisits').textContent = '—';
    document.getElementById('dashAvgSales').textContent    = '—';

    const data = await getSalesReport(months);
    if (!data) {
      document.getElementById('dashChartArea').innerHTML =
        '<div class="empty-state"><p>データの取得に失敗しました</p></div>';
      return;
    }

    // サマリー
    document.getElementById('dashTotalSales').textContent  = fmtNum(data.totalSales);
    document.getElementById('dashTotalVisits').textContent = fmtNum(data.totalVisits);
    const avg = data.totalVisits > 0 ? Math.round(data.totalSales / data.totalVisits) : 0;
    document.getElementById('dashAvgSales').textContent = fmtNum(avg);

    // グラフ描画
    const labels   = data.byMonth.map(m => m.month.replace('/', '/'));
    const sales    = data.byMonth.map(m => m.sales);
    const visits   = data.byMonth.map(m => m.visits);
    const hasPrices = data.totalSales > 0;

    document.getElementById('dashChartArea').innerHTML = '<canvas id="dashSalesChart"></canvas>';
    const ctx = document.getElementById('dashSalesChart').getContext('2d');

    if (dashBarChart) dashBarChart.destroy();

    const datasets = [];
    if (hasPrices) {
      datasets.push({
        type: 'bar',
        label: '売上 (円)',
        data: sales,
        backgroundColor: 'rgba(184,80,66,0.75)',
        borderColor: '#B85042',
        borderWidth: 1,
        yAxisID: 'y1',
        order: 2,
      });
    }
    datasets.push({
      type: 'line',
      label: '来店件数',
      data: visits,
      borderColor: '#A7BEAE',
      backgroundColor: 'rgba(167,190,174,0.15)',
      pointBackgroundColor: '#A7BEAE',
      pointRadius: 5,
      tension: 0.3,
      yAxisID: 'y2',
      order: 1,
    });

    const scales = {
      y2: {
        type: 'linear',
        position: hasPrices ? 'right' : 'left',
        title: { display: true, text: '来店件数' },
        beginAtZero: true,
        ticks: { stepSize: 1 },
        grid: { drawOnChartArea: !hasPrices },
      },
    };
    if (hasPrices) {
      scales.y1 = {
        type: 'linear',
        position: 'left',
        title: { display: true, text: '売上 (円)' },
        beginAtZero: true,
        grid: { drawOnChartArea: true },
      };
    }

    dashBarChart = new Chart(ctx, {
      data: { labels, datasets },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { position: 'top' },
          tooltip: {
            callbacks: {
              label: ctx => {
                const v = ctx.parsed.y;
                if (ctx.dataset.label.includes('売上')) return ` ¥${fmtNum(v)}`;
                return ` ${v} 件`;
              }
            }
          }
        },
        scales,
      }
    });
  }

  Promise.all([loadDashboard(), loadSalesReport()]);
</script>
</body>
</html>
