<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="favicon.ico">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#B85042">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>予約管理</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>
  <style>
    /* ── フィルタータブ ── */
    .filter-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
      flex-wrap: wrap;
      align-items: center;
    }
    .filter-tab {
      background: var(--white);
      border: 1px solid var(--border);
      color: var(--text-light);
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 0.82rem;
      transition: all 0.2s;
      cursor: pointer;
    }
    .filter-tab:hover { border-color: var(--gold); color: var(--gold); }
    .filter-tab.active {
      background: var(--gold);
      border-color: var(--gold);
      color: #fff;
      font-weight: 500;
    }
    .filter-tab .tab-count {
      background: rgba(255,255,255,0.3);
      border-radius: 10px;
      padding: 1px 7px;
      font-size: 0.75rem;
      margin-left: 4px;
    }
    .filter-tab:not(.active) .tab-count {
      background: var(--gold-light);
      color: var(--gold-dark);
    }

    /* ── キャンセルトグル ── */
    .toggle-cancel {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-light);
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 0.82rem;
      cursor: pointer;
      transition: all 0.2s;
      margin-left: auto;
    }
    .toggle-cancel:hover { border-color: var(--gold); color: var(--gold); }
    .toggle-cancel.hiding { border-color: #FBBABA; color: #B71C1C; background: #FDEAEA; }

    /* ── 今日ハイライト ── */
    tr.today-row td {
      background: var(--gold-bg);
    }
    tr.today-row td:first-child {
      border-left: 3px solid var(--gold);
    }
    .btn-complete {
      background: transparent;
      border: 1px solid #A5D6A7;
      color: #2E7D4F;
      font-size: 0.75rem;
      padding: 5px 12px;
      border-radius: 4px;
      transition: background 0.2s;
    }
    .btn-complete:hover { background: #EAF7EE; }
    .today-mark {
      display: inline-block;
      background: var(--gold);
      color: #fff;
      font-size: 0.68rem;
      padding: 1px 6px;
      border-radius: 3px;
      margin-left: 5px;
      vertical-align: middle;
    }
  </style>
</head>
<body>
<div class="layout">

  <!-- サイドバー -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <span class="logo-en" id="salonNameSidebar">Salon</span>
      <span class="logo-jp">サロン管理システム</span>
      <span class="logo-sub">Admin Panel</span>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-label">Menu</div>
      <a href="dashboard.html" class="nav-item">
        <span class="nav-icon">◈</span> ダッシュボード
      </a>
      <a href="reservations.html" class="nav-item active">
        <span class="nav-icon">◷</span> 予約管理
      </a>
      <a href="customers.html" class="nav-item">
        <span class="nav-icon">◉</span> 顧客管理
      </a>
      <a href="settings.html" class="nav-item">
        <span class="nav-icon">◎</span> 設定
      </a>
    </nav>
    <div class="sidebar-footer">
      <button class="btn-logout" onclick="logout()">ログアウト</button>
    </div>
  </aside>

  <!-- メインコンテンツ -->
  <div class="main-content">
    <div class="page-header">
      <div>
        <div class="page-title">Reservations</div>
        <div class="page-subtitle">予約管理</div>
      </div>
      <div class="header-right" id="headerBadges" style="display:flex;gap:8px;flex-wrap:wrap;"></div>
    </div>

    <div class="page-body">

      <!-- 月ナビゲーション -->
      <div class="month-nav">
        <button onclick="changeMonth(-1)">‹</button>
        <span class="month-label" id="monthLabel">—</span>
        <button onclick="changeMonth(1)">›</button>
      </div>

      <!-- フィルタータブ + キャンセルトグル -->
      <div class="filter-tabs" id="filterTabs" style="display:none;">
        <button class="filter-tab active" data-status="all" onclick="setFilter('all')">
          すべて <span class="tab-count" id="cnt-all">0</span>
        </button>
        <button class="filter-tab" data-status="未送信" onclick="setFilter('未送信')">
          未送信 <span class="tab-count" id="cnt-未送信">0</span>
        </button>
        <button class="filter-tab" data-status="送信済" onclick="setFilter('送信済')">
          送信済 <span class="tab-count" id="cnt-送信済">0</span>
        </button>
        <button class="filter-tab" data-status="リマインド済" onclick="setFilter('リマインド済')">
          リマインド済 <span class="tab-count" id="cnt-リマインド済">0</span>
        </button>
        <button class="toggle-cancel" id="toggleCancel" onclick="toggleCancel()">
          キャンセルを非表示
        </button>
      </div>

      <!-- 予約テーブル -->
      <div class="card">
        <div class="card-title">📋 予約一覧</div>
        <div id="reservationContent">
          <div class="loading"><div class="spinner"></div> 読み込み中...</div>
        </div>
      </div>

    </div>
  </div>
</div>

<script>
  checkAuth();
  document.getElementById('salonNameSidebar').textContent = SALON_NAME;
  document.title = '予約管理 - ' + SALON_NAME;

  let currentYear  = new Date().getFullYear();
  let currentMonth = new Date().getMonth() + 1;
  let allReservations = [];
  let currentFilter   = 'all';
  let hidingCancel    = false;

  const todayStr = (() => {
    const d = new Date();
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, '0');
    const day = String(d.getDate()).padStart(2, '0');
    return `${y}/${m}/${day}`;
  })();

  function monthStr() {
    return `${currentYear}/${String(currentMonth).padStart(2, '0')}`;
  }
  function updateMonthLabel() {
    document.getElementById('monthLabel').textContent =
      `${currentYear}年${currentMonth}月`;
  }
  function changeMonth(delta) {
    currentMonth += delta;
    if (currentMonth > 12) { currentMonth = 1;  currentYear++; }
    if (currentMonth < 1)  { currentMonth = 12; currentYear--; }
    updateMonthLabel();
    loadReservations();
  }

  function statusBadge(status) {
    const map = {
      '送信済':       'badge-green',
      'リマインド済': 'badge-blue',
      'キャンセル':   'badge-red',
      '未送信':       'badge-gray',
    };
    const cls = map[status] || 'badge-gray';
    return `<span class="badge ${cls}">${status || '未送信'}</span>`;
  }

  function planBadge(r) {
    if (r.plan === '回数コース') {
      const color = r.courseRemaining <= 2 ? '#B71C1C' : r.courseRemaining <= 4 ? '#E65100' : '#2E7D4F';
      return `<span style="display:inline-flex;align-items:center;gap:4px;background:#f0f8ff;border:1px solid #b3d9f7;color:#1565C0;border-radius:20px;padding:2px 10px;font-size:0.8rem;font-weight:600;">🎟 <span style="background:${color};color:#fff;border-radius:10px;padding:1px 7px;font-size:0.78rem;">残${r.courseRemaining}回</span></span>`;
    }
    return `<span style="background:#f5f5f5;border:1px solid #ddd;color:#999;border-radius:20px;padding:2px 10px;font-size:0.8rem;">都度払い</span>`;
  }

  // ② 件数バッジ更新
  function updateBadges(list) {
    const total    = list.filter(r => r.status !== 'キャンセル').length;
    const canceled = list.filter(r => r.status === 'キャンセル').length;
    document.getElementById('headerBadges').innerHTML = `
      <span class="badge badge-gold">今月 ${total} 件</span>
      ${canceled > 0 ? `<span class="badge badge-red">キャンセル ${canceled} 件</span>` : ''}
    `;

    // タブカウント更新
    const statuses = ['未送信','送信済','リマインド済'];
    const all = list.filter(r => r.status !== 'キャンセル').length;
    document.getElementById('cnt-all').textContent = all;
    statuses.forEach(s => {
      const el = document.getElementById('cnt-' + s);
      if (el) el.textContent = list.filter(r => r.status === s).length;
    });
  }

  // ① フィルター切替
  function setFilter(status) {
    currentFilter = status;
    document.querySelectorAll('.filter-tab').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.status === status);
    });
    renderTable();
  }

  // ④ キャンセル表示トグル
  function toggleCancel() {
    hidingCancel = !hidingCancel;
    const btn = document.getElementById('toggleCancel');
    if (hidingCancel) {
      btn.textContent = 'キャンセルを表示';
      btn.classList.add('hiding');
    } else {
      btn.textContent = 'キャンセルを非表示';
      btn.classList.remove('hiding');
    }
    renderTable();
  }

  function renderTable() {
    const el = document.getElementById('reservationContent');

    let list = allReservations;

    // キャンセル非表示
    if (hidingCancel) {
      list = list.filter(r => r.status !== 'キャンセル');
    }

    // ステータスフィルター（「all」はキャンセル以外全て）
    if (currentFilter !== 'all') {
      list = list.filter(r => r.status === currentFilter);
    } else {
      // allタブでもキャンセル非表示オフなら全件（キャンセルも含む）
    }

    if (list.length === 0) {
      el.innerHTML = `<div class="empty-state"><div class="empty-icon">🌿</div><p>該当する予約はありません</p></div>`;
      return;
    }

    el.innerHTML = `
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>日付</th>
              <th>時間</th>
              <th>お客様名</th>
              <th>メニュー</th>
              <th>残回数</th>
              <th>電話番号</th>
              <th>ステータス</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody>
            ${list.map(r => {
              const isToday   = r.date === todayStr;
              const isCancel  = r.status === 'キャンセル';
              const rowClass  = isToday ? 'today-row' : '';
              const rowStyle  = isCancel ? 'opacity:0.5' : '';
              const todayMark = isToday ? '<span class="today-mark">TODAY</span>' : '';
              return `
              <tr id="row-${r.row}" class="${rowClass}" ${rowStyle ? `style="${rowStyle}"` : ''}>
                <td>${r.date}${todayMark}</td>
                <td><strong>${r.time}</strong></td>
                <td>${r.customerId ? `<a href="customer-detail.html?id=${encodeURIComponent(r.customerId)}" style="color:var(--gold-dark);text-decoration:underline;font-weight:600;">${r.name}</a>` : r.name} 様</td>
                <td>${r.menu || '—'}</td>
                <td>${planBadge(r)}</td>
                <td>${r.phone || '—'}</td>
                <td>${statusBadge(r.status)}</td>
                <td style="display:flex;gap:6px;flex-wrap:wrap;">
                  ${r.status === '完了'
                    ? '<span style="color:#2E7D4F;font-size:0.82rem;">✓ 完了</span>'
                    : isCancel
                      ? '—'
                      : `<button class="btn btn-complete" onclick="doComplete(${r.row}, this)">完了</button>
                         <button class="btn btn-danger" onclick="doCancel(${r.row}, this)">キャンセル</button>`}
                </td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>`;
  }

  async function loadReservations() {
    const el = document.getElementById('reservationContent');
    el.innerHTML = '<div class="loading"><div class="spinner"></div> 読み込み中...</div>';
    document.getElementById('filterTabs').style.display = 'none';

    const data = await getReservations(monthStr());
    if (!data) {
      el.innerHTML = '<div class="empty-state"><p>データの取得に失敗しました</p></div>';
      return;
    }

    allReservations = data.reservations || [];
    updateBadges(allReservations);
    document.getElementById('filterTabs').style.display = 'flex';
    renderTable();
  }

  async function doComplete(row, btn) {
    if (!confirm('来店完了にしますか？\nメニューに応じたポイントが自動で付与されます。')) return;
    btn.disabled    = true;
    btn.textContent = '処理中...';
    const res = await completeReservation(row);
    if (res && res.success) {
      loadReservations();
    } else {
      alert('処理に失敗しました: ' + (res && res.message ? res.message : ''));
      btn.disabled    = false;
      btn.textContent = '完了';
    }
  }

  async function doCancel(row, btn) {
    if (!confirm('この予約をキャンセルしますか？')) return;
    btn.disabled    = true;
    btn.textContent = '処理中...';
    const res = await cancelReservation(row);
    if (res && res.success) {
      loadReservations();
    } else {
      alert('キャンセルに失敗しました。');
      btn.disabled    = false;
      btn.textContent = 'キャンセル';
    }
  }

  updateMonthLabel();
  loadReservations();
</script>
</body>
</html>
