<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="favicon.ico">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#D4688A">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>顧客管理</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>
</head>
<body>
<!-- 画面下部タブバー（スマホ専用） -->
<nav class="mobile-tab-bar">
  <div class="mobile-tab-bar-inner">
    <a href="dashboard.html" class="mobile-tab-item">
      <span class="mobile-tab-icon">🏠</span>ホーム
    </a>
    <a href="reservations.html" class="mobile-tab-item">
      <span class="mobile-tab-icon">📅</span>予約
    </a>
    <a href="customers.html" class="mobile-tab-item active">
      <span class="mobile-tab-icon">👥</span>顧客
    </a>
    <a href="sales.html" class="mobile-tab-item">
      <span class="mobile-tab-icon">📊</span>売上
    </a>
    <a href="settings.html" class="mobile-tab-item">
      <span class="mobile-tab-icon">⚙️</span>設定
    </a>
  </div>
</nav>

<div class="layout">

  <!-- サイドバー -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <span class="logo-en" id="salonNameSidebar">Salon</span>
      <span class="logo-jp">サロン管理システム</span>
      <span class="logo-sub">Admin Panel</span>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-label">Menu</div>
      <a href="dashboard.html" class="nav-item">
        <span class="nav-icon">◈</span> ダッシュボード
      </a>
      <a href="reservations.html" class="nav-item">
        <span class="nav-icon">◷</span> 予約管理
      </a>
      <a href="customers.html" class="nav-item active">
        <span class="nav-icon">◉</span> 顧客管理
      </a>
      <a href="sales.html" class="nav-item">
        <span class="nav-icon">◑</span> 売上レポート
      </a>
      <a href="settings.html" class="nav-item">
        <span class="nav-icon">◎</span> 設定
      </a>
      <a href="exchange-admin.html" class="nav-item" style="display:none" title="β版では無効">
        <span class="nav-icon">◈</span> 交換管理
      </a>
    </nav>
    <div class="sidebar-footer">
      <button class="btn-logout" onclick="logout()">ログアウト</button>
    </div>
  </aside>

  <!-- メインコンテンツ -->
  <div class="main-content">
    <div class="page-header">
      <div>
        <div class="page-title">Customers</div>
        <div class="page-subtitle">顧客管理</div>
      </div>
      <div class="header-right">
        <span class="badge badge-gold" id="customerCount">読み込み中...</span>
      </div>
    </div>

    <div class="page-body">

      <!-- フィルタータブ -->
      <div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;" id="filterTabs">
        <button class="filter-tab active" onclick="setFilter('all', this)">全員</button>
        <button class="filter-tab" onclick="setFilter('course', this)">回数コース</button>
        <button class="filter-tab" onclick="setFilter('single', this)">都度払い</button>
        <button class="filter-tab" onclick="setFilter('alert', this)">⚠ 残少</button>
      </div>

      <!-- 検索 -->
      <div style="display:flex; gap:10px; align-items:center; margin-bottom:20px;">
        <div class="search-box" style="margin-bottom:0;">
          <span class="search-icon">🔍</span>
          <input type="text" id="searchInput" placeholder="名前・電話番号で検索"
            onkeydown="if(event.key==='Enter') applyFilters()">
        </div>
        <button class="btn btn-gold" onclick="applyFilters()">検索</button>
        <button class="btn btn-outline" onclick="resetSearch()">リセット</button>
      </div>

      <!-- 顧客テーブル -->
      <div class="card">
        <div class="card-title">👤 顧客一覧</div>
        <div id="customerContent">
          <div class="loading"><div class="spinner"></div> 読み込み中...</div>
        </div>
      </div>

    </div>
  </div>
</div>

<style>
  .filter-tab {
    padding: 7px 16px;
    border: 1.5px solid var(--border);
    border-radius: 20px;
    background: #fff;
    color: var(--text-light);
    font-size: 0.82rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }
  .filter-tab.active {
    background: var(--primary);
    color: #fff;
    border-color: var(--primary);
  }
  .filter-tab:hover:not(.active) {
    border-color: var(--primary);
    color: var(--primary);
  }
</style>

<script>
  checkAuth();
  document.getElementById('salonNameSidebar').textContent = SALON_NAME;
  document.title = '顧客管理 - ' + SALON_NAME;

  let allCustomers  = [];
  let currentFilter = 'all';

  function setFilter(filter, el) {
    currentFilter = filter;
    document.querySelectorAll('.filter-tab').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    applyFilters();
  }

  function applyFilters() {
    let list = allCustomers;
    const q = document.getElementById('searchInput').value.trim().toLowerCase();
    if (q) list = list.filter(c =>
      (c.name  || '').toLowerCase().includes(q) ||
      (c.phone || '').includes(q)
    );
    if (currentFilter === 'course') list = list.filter(c => c.plan === '回数コース');
    else if (currentFilter === 'single') list = list.filter(c => c.plan !== '回数コース');
    else if (currentFilter === 'alert')  list = list.filter(c => c.plan === '回数コース' && c.courseRemaining <= 4);
    if (currentFilter === 'alert') list = [...list].sort((a, b) => a.courseRemaining - b.courseRemaining);
    renderTable(list);
  }

  function planBadge(c) {
    if (c.plan === '回数コース') {
      const courseName = c.courseName || '';
      const color = c.courseRemaining <= 2 ? '#B71C1C' : c.courseRemaining <= 4 ? '#E65100' : '#2E7D4F';
      return `<span style="display:inline-flex;align-items:center;gap:5px;background:#f0f8ff;border:1px solid #b3d9f7;color:#1565C0;border-radius:20px;padding:2px 10px;font-size:0.82rem;font-weight:600;">
        🎟 ${courseName ? courseName + ' ' : ''}${c.courseTotal}回コース
        <span style="background:${color};color:#fff;border-radius:10px;padding:1px 7px;font-size:0.78rem;">残${c.courseRemaining}回</span>
      </span>`;
    }
    return `<span style="background:#f5f5f5;border:1px solid #ddd;color:#888;border-radius:20px;padding:2px 10px;font-size:0.82rem;">都度払い</span>`;
  }

  function remainingCell(c) {
    if (c.plan !== '回数コース') return '<span style="color:#ccc;">—</span>';
    const r  = c.courseRemaining;
    const t  = c.courseTotal;
    const color = r <= 2 ? '#B71C1C' : r <= 4 ? '#E65100' : '#2E7D4F';
    const bg    = r <= 2 ? '#FDECEA' : r <= 4 ? '#FFF3E0' : '#E8F7F1';
    return `<span style="background:${bg};color:${color};border-radius:20px;padding:3px 12px;font-weight:700;font-size:0.9rem;">${r}<span style="color:#aaa;font-size:0.78rem;font-weight:400;">/${t}</span></span>`;
  }

  function formatDate(val) {
    if (!val) return '<span style="color:#bbb">未記録</span>';
    try {
      const d = new Date(val);
      if (isNaN(d)) return val;
      return d.toLocaleDateString('ja-JP');
    } catch { return val; }
  }

  function renderTable(list) {
    const el = document.getElementById('customerContent');
    if (list.length === 0) {
      el.innerHTML = `<div class="empty-state"><div class="empty-icon">🌿</div><p>顧客データがありません</p></div>`;
      return;
    }
    el.innerHTML = `
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>顧客ID</th>
              <th>お名前</th>
              <th>電話番号</th>
              <th>プラン</th>
              <th>残回数</th>
              <th>保有ポイント</th>
              <th>最終来店日</th>
              <th>登録日</th>
            </tr>
          </thead>
          <tbody>
            ${list.map(c => `
              <tr>
                <td><span style="color:var(--text-light);font-size:0.82rem;">${c.customerId || '—'}</span></td>
                <td><a href="customer-detail.html?id=${encodeURIComponent(c.customerId)}" style="color:var(--gold-dark);text-decoration:underline;font-weight:600;">${c.name || '（未登録）'}</a></td>
                <td>${c.phone || '—'}</td>
                <td>${planBadge(c)}</td>
                <td>${remainingCell(c)}</td>
                <td><span class="badge badge-gold">${c.points ?? 0} pt</span></td>
                <td>${formatDate(c.lastVisit)}</td>
                <td>${formatDate(c.createdAt)}</td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>`;
  }

  function filterCustomers() { applyFilters(); }

  function resetSearch() {
    document.getElementById('searchInput').value = '';
    applyFilters();
  }

  async function loadCustomers() {
    const data = await getCustomers();
    if (!data) {
      document.getElementById('customerContent').innerHTML =
        '<div class="empty-state"><p>データの取得に失敗しました</p></div>';
      return;
    }
    allCustomers = data.customers || [];
    document.getElementById('customerCount').textContent = `総顧客数 ${allCustomers.length} 名`;
    renderTable(allCustomers);
  }

  loadCustomers();
</script>
</body>
</html>
